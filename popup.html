<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Datei Reader</title>
    <style>
        /* Ein bisschen CSS, damit es nicht ganz so trocken aussieht */
        body { 
            width: 300px; 
            font-family: sans-serif; 
            padding: 15px; 
        }
        #ausgabe { 
            margin-top: 10px; 
            padding: 5px; 
            background: #f4f4f4; 
            border: 1px solid #ccc;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap; /* Behält Zeilenumbrüche bei */
            font-size: 9px;
        }
    </style>
</head>
<body>
    <button id="fillFormBtn" style="width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer;">
  Formular mit KI ausfüllen
  </button>
  <p id="statusMeldung" style="font-size: 11px; color: #666;"></p>  
  <hr>
    <h3>Datei auswählen</h3>
    
    <!-- Der Dateiwähler -->
    <input type="file" id="fileInput">

    <!-- Hier wird der Text später reingeschrieben -->
    <div id="ausgabe">Wähle eine .txt/.jpg/.pdf Datei...</div>
    <hr>
   
    <h3>Gespeicherte Dateien:</h3>
    <ul id="dateiListe" style="list-style: none; padding: 0;"></ul>
    <!-- Die Verbindung zur JS-Datei -->
    <script src="popup.js"></script>

</body>
</html>
